name: Build Freeze Daemon

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27
        run: |
          echo "y" | sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install host toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang llvm \
            libelf-dev zlib1g-dev \
            libbpf-dev \
            linux-headers-$(uname -r)

      - name: Compile eBPF program
        run: |
          clang -target bpf -O2 -g -mcpu=v2 \
            -D__TARGET_ARCH_arm64 \
            -I src \
            -I /usr/include \
            -c src/platform/freeze_monitor.bpf.c \
            -o freeze_monitor.bpf.o
          ls -lh freeze_monitor.bpf.o

      - name: Download prebuilt libbpf for arm64
        run: |
          # 使用 nickdesaulniers/libbpf-android 预编译库
          LIBBPF_URL="https://github.com/nickdesaulniers/libbpf-android/releases/download/v1.4.0/libbpf-android-v1.4.0.tar.gz"
          mkdir -p /tmp/libbpf-prebuilt
          cd /tmp/libbpf-prebuilt
          wget -q "$LIBBPF_URL" -O libbpf.tar.gz
          tar xf libbpf.tar.gz
          # 假设压缩包内容为 libbpf.a 和 include/ 目录
          mkdir -p $GITHUB_WORKSPACE/prebuilt/libbpf/{lib,include}
          cp libbpf.a $GITHUB_WORKSPACE/prebuilt/libbpf/lib/
          cp -r include/* $GITHUB_WORKSPACE/prebuilt/libbpf/include/
          echo "Prebuilt libbpf downloaded"

      - name: Compile Daemon (arm64)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBBPF_DIR=$GITHUB_WORKSPACE/prebuilt/libbpf
          cmake --build build --target freeze_daemon -j$(nproc)
          echo "Binary: $(ls -lh build/freeze_daemon)"

      - name: Package module
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          PKG=module_package
          mkdir -p $PKG/{bin,config,webui,logs}

          cp module.prop                  $PKG/
          cp scripts/service.sh           $PKG/service.sh
          chmod +x $PKG/service.sh

          cp build/freeze_daemon          $PKG/bin/
          cp freeze_monitor.bpf.o         $PKG/bin/
          chmod +x $PKG/bin/freeze_daemon

          cp config/freeze.conf           $PKG/config/
          cp config/user_whitelist.txt    $PKG/config/
          cp config/system_blacklist.txt  $PKG/config/

          cp webui/index.html             $PKG/webui/

          cd $PKG
          zip -r ../freeze-daemon-${SAFE_REF}.zip .
          cd ..
          echo "Package: $(ls -lh freeze-daemon-${SAFE_REF}.zip)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeze-daemon-module
          path: freeze-daemon-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: freeze-daemon-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}