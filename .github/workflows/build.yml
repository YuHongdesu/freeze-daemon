name: Build Freeze Daemon

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27d
        run: |
          echo "y" | sdkmanager "ndk;27.3.13750724"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> $GITHUB_ENV

      - name: Install host toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Compile eBPF program
        run: |
          clang -target bpf -O2 -g -mcpu=v2 \
            -D__TARGET_ARCH_arm64 \
            -I src \
            -I /usr/include \
            -c src/platform/freeze_monitor.bpf.c \
            -o freeze_monitor.bpf.o
          ls -lh freeze_monitor.bpf.o

      - name: Cross-compile libbpf for arm64-v8a
        run: |
          set -ex
          NDK=$NDK_HOME
          API=33
          TARGET=aarch64-linux-android
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          PREFIX=$GITHUB_WORKSPACE/prebuilt/libbpf

          mkdir -p $PREFIX/lib $PREFIX/include/bpf
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export NM=$TOOLCHAIN/bin/llvm-nm
          test -x "$CC" || { echo "FATAL: NDK clang not found at $CC"; exit 1; }

          echo "=== [1/3] zlib for arm64 ==="
          curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz -o /tmp/zlib.tar.gz
          mkdir -p /tmp/zlib && tar -xzf /tmp/zlib.tar.gz -C /tmp/zlib --strip-components=1
          cd /tmp/zlib
          CHOST=$TARGET CC=$CC AR=$AR RANLIB=$RANLIB \
            CFLAGS="--sysroot=$SYSROOT -fPIC -O2" \
            ./configure --static --prefix=$PREFIX
          make -j$(nproc) libz.a
          cp libz.a $PREFIX/lib/
          cp zlib.h zconf.h $PREFIX/include/
          test -f "$PREFIX/lib/libz.a" || { echo "FATAL: libz.a not produced"; exit 1; }
          echo "zlib OK: $(ls -la $PREFIX/lib/libz.a)"

          echo "=== [2/3] libelf (arachsys, arm64) ==="
          curl -fsSL https://codeload.github.com/arachsys/libelf/tar.gz/refs/heads/master \
            -o /tmp/libelf.tar.gz
          mkdir -p /tmp/libelf && tar -xzf /tmp/libelf.tar.gz -C /tmp/libelf --strip-components=1
          cd /tmp/libelf

          echo "----- BEGIN libelf Makefile -----"
          cat Makefile
          echo "----- END libelf Makefile -----"
          echo "----- BEGIN libelf src/config.h -----"
          cat src/config.h
          echo "----- END libelf src/config.h -----"

          NDK_SHIM_INCLUDE=$GITHUB_WORKSPACE/scripts/ndk-shims
          sed -i "s|\$(CC)|\$(CC) --sysroot=$SYSROOT -I$NDK_SHIM_INCLUDE -I$PREFIX/include|g" Makefile

          sed -i '/ENABLE_NLS/d' src/config.h 2>/dev/null || true
          sed -i '/#define.*NLS/d' src/config.h 2>/dev/null || true
          sed -i '/USE_ZSTD/d' src/config.h || true

          # 删除冲突的 crc32.c，避免与 zlib 的 crc32 符号重复
          rm -f src/crc32.c

          echo "----- Makefile after sed patch (grep CC) -----"
          grep -n '\$(CC)' Makefile || echo "警告：没有匹配到 \$(CC)"

          CC=$CC AR=$AR RANLIB=$RANLIB PREFIX=$PREFIX \
            make -j$(nproc) install-static install-headers 2>&1 | tee /tmp/libelf-build.log \
            || { echo "FATAL: libelf make failed, see log above"; exit 1; }
          test -f "$PREFIX/lib/libelf.a" || { echo "FATAL: libelf.a not produced"; exit 1; }
          test -f "$PREFIX/include/libelf.h" || { echo "FATAL: libelf.h not installed"; exit 1; }
          echo "libelf OK: $(ls -la $PREFIX/lib/libelf.a)"

          echo "=== [3/3] libbpf (arm64) ==="
          curl -fsSL https://github.com/libbpf/libbpf/archive/refs/tags/v1.7.0.tar.gz -o /tmp/libbpf.tar.gz
          mkdir -p /tmp/libbpf && tar -xzf /tmp/libbpf.tar.gz -C /tmp/libbpf --strip-components=1
          cd /tmp/libbpf/src
          mkdir -p /tmp/libbpf-build

          # libbpf 1.7.0 已内置 __poll_t 定义，无需手动 -D 覆盖
          CC=$CC AR=$AR \
          EXTRA_CFLAGS="--sysroot=$SYSROOT -I$PREFIX/include" \
          LDLIBS="-lelf -lz" \
          NO_PKG_CONFIG=1 BUILD_STATIC_ONLY=y \
          OBJDIR=/tmp/libbpf-build DESTDIR=$PREFIX PREFIX= \
            make -j$(nproc) install_headers 2>&1 | tee /tmp/libbpf-headers.log \
            || { echo "FATAL: libbpf install_headers failed, see log above"; exit 1; }

          CC=$CC AR=$AR \
          EXTRA_CFLAGS="--sysroot=$SYSROOT -I$PREFIX/include" \
          LDLIBS="-lelf -lz" \
          NO_PKG_CONFIG=1 BUILD_STATIC_ONLY=y \
          OBJDIR=/tmp/libbpf-build DESTDIR=$PREFIX \
            make -j$(nproc) 2>&1 | tee /tmp/libbpf-build.log \
            || { echo "FATAL: libbpf make failed, see log above"; exit 1; }

          find /tmp/libbpf-build -name "libbpf.a" -exec cp {} $PREFIX/lib/ \;
          test -f "$PREFIX/lib/libbpf.a" || { echo "FATAL: libbpf.a not produced"; exit 1; }
          test -f "$PREFIX/include/bpf/libbpf.h" || { echo "FATAL: libbpf.h not installed to expected path"; exit 1; }
          echo "libbpf OK: $(ls -la $PREFIX/lib/libbpf.a)"

          echo "=== prebuilt/libbpf final layout ==="
          find $PREFIX -maxdepth 3 -type f | sort

          echo "=== quick symbol sanity check (arm64 objects expected) ==="
          $TOOLCHAIN/bin/llvm-readobj -h $PREFIX/lib/libbpf.a 2>/dev/null | grep -m1 "Machine" || \
            $TOOLCHAIN/bin/llvm-objdump -a $PREFIX/lib/libbpf.a | head -5

      - name: Compile Daemon (arm64)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBBPF_DIR=$GITHUB_WORKSPACE/prebuilt/libbpf
          cmake --build build --target freeze_daemon -j$(nproc)
          echo "Binary: $(ls -lh build/freeze_daemon)"

      - name: Package module
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          PKG=module_package
          mkdir -p $PKG/{bin,config,webui,logs}
          cp module.prop                  $PKG/
          cp scripts/service.sh           $PKG/service.sh && chmod +x $PKG/service.sh
          cp build/freeze_daemon          $PKG/bin/   && chmod +x $PKG/bin/freeze_daemon
          cp freeze_monitor.bpf.o         $PKG/bin/
          cp config/freeze.conf           $PKG/config/
          cp config/user_whitelist.txt    $PKG/config/
          cp config/system_blacklist.txt  $PKG/config/
          cp webui/index.html             $PKG/webui/
          cd $PKG
          zip -r ../freeze-daemon-${SAFE_REF}.zip .
          cd ..
          echo "Package: $(ls -lh freeze-daemon-${SAFE_REF}.zip)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeze-daemon-module
          path: freeze-daemon-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: freeze-daemon-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}