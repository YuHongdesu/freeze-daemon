name: Build Freeze Daemon

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27
        run: |
          echo "y" | sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install host toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang llvm \
            libelf-dev zlib1g-dev \
            libbpf-dev \
            linux-headers-$(uname -r)

      - name: Download arm64 libraries for libbpf
        run: |
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/arm64-ports.list -o Dir::Etc::sourceparts="" -o APT::Get::List-Cleanup=0
          cd /tmp
          apt-get download libelf-dev:arm64 zlib1g-dev:arm64
          mkdir -p /tmp/arm64-root
          for deb in *.deb; do dpkg-deb -x "$deb" /tmp/arm64-root; done

      - name: Compile eBPF program
        run: |
          clang -target bpf -O2 -g -mcpu=v2 \
            -D__TARGET_ARCH_arm64 \
            -I src \
            -I /usr/include \
            -c src/platform/freeze_monitor.bpf.c \
            -o freeze_monitor.bpf.o
          ls -lh freeze_monitor.bpf.o

      - name: Cross-compile libbpf for arm64
        run: |
          NDK=$NDK_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          SYSROOT=$TOOLCHAIN/sysroot
          CC=$TOOLCHAIN/bin/aarch64-linux-android33-clang
          ARM64_ROOT=/tmp/arm64-root

          git clone --depth=1 --branch v1.4.0 https://github.com/libbpf/libbpf.git /tmp/libbpf
          cd /tmp/libbpf/src
          mkdir -p /tmp/libbpf-build
          make CC="$CC" \
               CFLAGS="--sysroot=$SYSROOT -target aarch64-linux-android33 \
                       -I$ARM64_ROOT/usr/include \
                       -I$ARM64_ROOT/usr/include/aarch64-linux-gnu \
                       -D__poll_t=unsigned" \
               LDFLAGS="-L$ARM64_ROOT/usr/lib/aarch64-linux-gnu" \
               LDLIBS="-l:libelf.a -l:libz.a" \
               OBJDIR=/tmp/libbpf-build \
               BUILD_STATIC_ONLY=1 \
               -j$(nproc)

          # 安装到预定义位置，确保目录结构正确
          INSTALL_DIR=$GITHUB_WORKSPACE/prebuilt/libbpf
          mkdir -p $INSTALL_DIR/lib $INSTALL_DIR/include/bpf
          cp -v /tmp/libbpf-build/libbpf.a  $INSTALL_DIR/lib/
          cp -v /tmp/libbpf/src/*.h         $INSTALL_DIR/include/bpf/

      - name: Verify libbpf installation
        run: |
          echo "=== libbpf installation tree ==="
          ls -R $GITHUB_WORKSPACE/prebuilt/libbpf
          echo "=== checking libbpf.a ==="
          file $GITHUB_WORKSPACE/prebuilt/libbpf/lib/libbpf.a

      - name: Compile Daemon (arm64)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBBPF_DIR=$GITHUB_WORKSPACE/prebuilt/libbpf
          cmake --build build --target freeze_daemon -j$(nproc)
          echo "Binary: $(ls -lh build/freeze_daemon)"

      - name: Package module
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          PKG=module_package
          mkdir -p $PKG/{bin,config,webui,logs}

          cp module.prop                  $PKG/
          cp scripts/service.sh           $PKG/service.sh
          chmod +x $PKG/service.sh

          cp build/freeze_daemon          $PKG/bin/
          cp freeze_monitor.bpf.o         $PKG/bin/
          chmod +x $PKG/bin/freeze_daemon

          cp config/freeze.conf           $PKG/config/
          cp config/user_whitelist.txt    $PKG/config/
          cp config/system_blacklist.txt  $PKG/config/

          cp webui/index.html             $PKG/webui/

          cd $PKG
          zip -r ../freeze-daemon-${SAFE_REF}.zip .
          cd ..
          echo "Package: $(ls -lh freeze-daemon-${SAFE_REF}.zip)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeze-daemon-module
          path: freeze-daemon-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: freeze-daemon-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}